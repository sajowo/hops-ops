info:
  name: Rezerwacja sprzetu
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/rental-offers/{{rental_offer_id}}/reservations"
  body:
    type: json
    data: |-
      {
        "equipmentId": {{equipment_id}},
        "customerId": {{customer_id}},
        "reservedFrom": "2026-06-15",
        "reservedTo": "2026-06-20"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
