info:
  name: Rejestracja klienta
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/customers"
  body:
    type: json
    data: |-
      {
        "firstName": "Jan",
        "lastName": "Kowalski",
        "address": "Rzeszow, ul. Testowa 1",
        "phoneNumber": "500600700",
        "email": "jan.kowalski@example.com"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.id) {
          bru.setVar("customer_id", String(body.id));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
