info:
  name: Rejestracja oferty sprzedazy
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/sales-offers"
  body:
    type: json
    data: |-
      {
        "equipmentName": "Kosiarka spalinowa",
        "category": "Ogrod",
        "manufacturer": "Demo",
        "description": "Sprzet do sprzedazy",
        "salePrice": 1200.00
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.id) {
          bru.setVar("sales_offer_id", String(body.id));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
